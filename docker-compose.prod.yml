version: '3.8'

services:
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/conf.d/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - realtime
      - frontend
    networks:
      - ticketing-network
      - nginx-proxy
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ticketing}
      MYSQL_USER: ${DB_USERNAME:-ticketuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ticketpass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
    networks:
      - ticketing-network

  redis:
    image: redis:7.0-alpine
    command: [ "redis-server", "--notify-keyspace-events", "Ex" ]
    networks:
      - ticketing-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # S'hereta tot del .env, només sobrescribim hosts de xarxa interna de Docker
      DB_HOST: mysql
      REDIS_HOST: redis
      REDIS_PASSWORD: ""
    depends_on:
      - mysql
      - redis
    # ... healthcheck ...
    networks:
      - ticketing-network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      REDIS_PASSWORD: ""
    command: sh -c "sleep 20 && php artisan outbox:process --realtime"
    depends_on:
      - mysql
      - redis
    networks:
      - ticketing-network

  realtime:
    build:
      context: ./realtime
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      JWT_SECRET: RBFyraVNL1Ovmwm8jtcO4sMnTB4RzTJpis3s6Q0MCjPQ9ScSlYdjNCko2zaz9tNo
    deploy:
      replicas: 1
    depends_on:
      - redis
    networks:
      - ticketing-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod # Fa servir la versió compilada amb Nginx
    networks:
      - ticketing-network

networks:
  ticketing-network:
    driver: bridge
  nginx-proxy:
    external: true
