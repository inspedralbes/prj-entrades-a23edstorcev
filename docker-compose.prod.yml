version: '3.8'

services:
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/conf.d/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - realtime
      - frontend
    networks:
      - ticketing-network
      - nginx-proxy
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ticketing
      MYSQL_ROOT_PASSWORD: root
    networks:
      - ticketing-network

  redis:
    image: redis:7.0-alpine
    command: ["redis-server", "--notify-keyspace-events", "Ex"]
    networks:
      - ticketing-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    # En producció NO hi ha volums de codi
    depends_on:
      - mysql
      - redis
    networks:
      - ticketing-network

  realtime:
    build:
      context: ./realtime
      dockerfile: Dockerfile
    environment:
      REDIS_HOST: redis
      JWT_SECRET: RBFyraVNL1Ovmwm8jtcO4sMnTB4RzTJpis3s6Q0MCjPQ9ScSlYdjNCko2zaz9tNo
    deploy:
      replicas: 3 # Alta disponibilitat real
    depends_on:
      - redis
    networks:
      - ticketing-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod # Fa servir la versió compilada amb Nginx
    networks:
      - ticketing-network

networks:
  ticketing-network:
    driver: bridge
  nginx-proxy:   
    external: true
